<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator Investiții — Dobândă Compusă</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap');

:root {
  --bg: #ffffff;
  --surface: #f6f8fa;
  --surface2: #eef1f5;
  --border: #d0d7de;
  --text: #1f2328;
  --text-dim: #656d76;
  --accent: #1a7f37;
  --accent2: #0969da;
  --accent3: #cf5400;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.header {
  background: linear-gradient(135deg, #f0f4f8 0%, #e8edf3 50%, #f0f4f8 100%);
  border-bottom: 1px solid var(--border);
  padding: 20px 32px;
  display: flex;
  align-items: center;
  gap: 20px;
}

.logo {
  font-family: 'JetBrains Mono', monospace;
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -1px;
}

.header-sub {
  font-size: 17px;
  color: #000;
  border-left: 1px solid var(--border);
  padding-left: 20px;
  font-weight: 500;
}

.back-link {
  margin-left: auto;
  font-size: 13px;
  color: var(--accent2);
  text-decoration: none;
  font-weight: 600;
}

.back-link:hover { text-decoration: underline; }

.main {
  display: grid;
  grid-template-columns: 340px 1fr;
  min-height: calc(100vh - 75px);
}

.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 24px;
  overflow-y: auto;
  max-height: calc(100vh - 75px);
}

.sidebar h3 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  margin-bottom: 14px;
  font-weight: 600;
}

.input-group { margin-bottom: 20px; }

.input-group label {
  display: block;
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 6px;
  font-weight: 500;
}

.input-row {
  display: flex;
  gap: 8px;
  align-items: center;
}

.input-row input, .input-row select {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 15px;
  font-family: 'JetBrains Mono', monospace;
  outline: none;
  transition: border-color .2s;
}

.input-row input:focus, .input-row select:focus { border-color: var(--accent); }

.input-row .unit {
  font-size: 12px;
  color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
  min-width: 30px;
}

.content {
  padding: 24px;
  overflow-y: auto;
  max-height: calc(100vh - 75px);
}

.canvas-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
  position: relative;
}

.canvas-wrap h3 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--text);
}

canvas {
  width: 100%;
  height: 400px;
  display: block;
  border-radius: 8px;
}

.results {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}

.result-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
}

.result-card .card-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.result-card .card-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px;
  font-weight: 700;
}

.result-card .card-sub {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 4px;
}

.table-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-top: 20px;
  overflow-x: auto;
}

.table-wrap h3 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  font-family: 'JetBrains Mono', monospace;
}

th {
  text-align: left;
  padding: 8px 12px;
  border-bottom: 2px solid var(--border);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  font-weight: 600;
}

td {
  padding: 6px 12px;
  border-bottom: 1px solid var(--border);
}

tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--surface2); }

.tooltip-box {
  position: absolute;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  pointer-events: none;
  display: none;
  z-index: 10;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
}

@media (max-width: 768px) {
  .main { grid-template-columns: 1fr; }
  .sidebar { max-height: none; border-right: none; border-bottom: 1px solid var(--border); }
  .content { max-height: none; }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">INVESTIȚII</div>
  <div class="header-sub">Calculator Dobândă Compusă</div>
  <a class="back-link" href="../">&larr; Toate instrumentele</a>
</div>

<div class="main">
  <div class="sidebar">
    <h3>Parametri investiție</h3>

    <div class="input-group">
      <label>Capital inițial</label>
      <div class="input-row">
        <input type="number" id="inputPrincipal" value="10000" step="100" min="0">
        <span class="unit">EUR</span>
      </div>
    </div>

    <div class="input-group">
      <label>Contribuție lunară</label>
      <div class="input-row">
        <input type="number" id="inputMonthly" value="500" step="50" min="0">
        <span class="unit">EUR</span>
      </div>
    </div>

    <div class="input-group">
      <label>Rata anuală a dobânzii</label>
      <div class="input-row">
        <input type="number" id="inputRate" value="7" step="0.1" min="0" max="100">
        <span class="unit">%</span>
      </div>
    </div>

    <div class="input-group">
      <label>Perioadă</label>
      <div class="input-row">
        <input type="number" id="inputYears" value="20" step="1" min="1" max="60">
        <span class="unit">ani</span>
      </div>
    </div>

    <h3 style="margin-top:24px">Frecvență capitalizare</h3>
    <div class="input-group">
      <div class="input-row">
        <select id="inputCompound">
          <option value="12" selected>Lunar</option>
          <option value="4">Trimestrial</option>
          <option value="2">Semestrial</option>
          <option value="1">Anual</option>
        </select>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="results" id="resultsCards"></div>

    <div class="canvas-wrap">
      <h3>Evoluție investiție</h3>
      <canvas id="chart"></canvas>
      <div class="tooltip-box" id="tooltip"></div>
    </div>

    <div class="table-wrap">
      <h3>Detalii anuale</h3>
      <table>
        <thead>
          <tr>
            <th>An</th>
            <th>Contribuții</th>
            <th>Dobândă</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
function fmt(n) {
  return n.toLocaleString('ro-RO', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

function calculate() {
  const P = parseFloat(document.getElementById('inputPrincipal').value) || 0;
  const monthly = parseFloat(document.getElementById('inputMonthly').value) || 0;
  const ratePercent = parseFloat(document.getElementById('inputRate').value) || 0;
  const years = parseInt(document.getElementById('inputYears').value) || 1;
  const n = parseInt(document.getElementById('inputCompound').value);

  const r = ratePercent / 100;
  const rPeriod = r / n;
  const periodsPerYear = n;

  // Calculate year-by-year
  let balance = P;
  const yearlyData = [{ year: 0, deposits: P, interest: 0, total: P }];
  let totalDeposits = P;
  let totalInterest = 0;

  for (let y = 1; y <= years; y++) {
    let yearInterest = 0;
    for (let period = 0; period < periodsPerYear; period++) {
      // Add monthly contributions for this period
      const monthsInPeriod = 12 / periodsPerYear;
      const contribution = monthly * monthsInPeriod;
      balance += contribution;
      totalDeposits += contribution;

      // Apply interest
      const interest = balance * rPeriod;
      balance += interest;
      yearInterest += interest;
      totalInterest += interest;
    }
    yearlyData.push({
      year: y,
      deposits: totalDeposits,
      interest: totalInterest,
      total: balance
    });
  }

  renderResults(balance, totalDeposits, totalInterest);
  renderTable(yearlyData);
  drawChart(yearlyData);
}

function renderResults(total, deposits, interest) {
  const container = document.getElementById('resultsCards');
  container.innerHTML = `
    <div class="result-card">
      <div class="card-title">Valoare finală</div>
      <div class="card-value" style="color:var(--accent)">${fmt(total)} EUR</div>
    </div>
    <div class="result-card">
      <div class="card-title">Total contribuții</div>
      <div class="card-value">${fmt(deposits)} EUR</div>
    </div>
    <div class="result-card">
      <div class="card-title">Dobândă acumulată</div>
      <div class="card-value" style="color:var(--accent2)">${fmt(interest)} EUR</div>
      <div class="card-sub">${((interest / deposits) * 100).toFixed(1)}% din contribuții</div>
    </div>
  `;
}

function renderTable(data) {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = data.slice(1).map(d => `
    <tr>
      <td>${d.year}</td>
      <td>${fmt(d.deposits)} EUR</td>
      <td>${fmt(d.interest)} EUR</td>
      <td style="font-weight:700">${fmt(d.total)} EUR</td>
    </tr>
  `).join('');
}

function drawChart(data) {
  const canvas = document.getElementById('chart');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;

  const pad = { top: 20, right: 30, bottom: 50, left: 80 };
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top - pad.bottom;

  const maxYear = data[data.length - 1].year;
  const maxVal = Math.ceil(data[data.length - 1].total / 10000) * 10000;

  const scaleX = y => pad.left + (y / maxYear) * cw;
  const scaleY = v => pad.top + ch - (v / maxVal) * ch;

  // Background
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = '#e1e4e8';
  ctx.lineWidth = 0.5;
  const yStep = maxVal > 500000 ? 100000 : (maxVal > 100000 ? 50000 : (maxVal > 50000 ? 10000 : 5000));
  for (let v = 0; v <= maxVal; v += yStep) {
    ctx.beginPath();
    ctx.moveTo(pad.left, scaleY(v));
    ctx.lineTo(pad.left + cw, scaleY(v));
    ctx.stroke();
  }
  for (let y = 0; y <= maxYear; y += Math.max(1, Math.floor(maxYear / 10))) {
    ctx.beginPath();
    ctx.moveTo(scaleX(y), pad.top);
    ctx.lineTo(scaleX(y), pad.top + ch);
    ctx.stroke();
  }

  // Axes
  ctx.strokeStyle = '#8b949e';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(pad.left, pad.top);
  ctx.lineTo(pad.left, pad.top + ch);
  ctx.lineTo(pad.left + cw, pad.top + ch);
  ctx.stroke();

  // Axis labels
  ctx.fillStyle = '#57606a';
  ctx.font = '11px JetBrains Mono, monospace';
  ctx.textAlign = 'center';
  for (let y = 0; y <= maxYear; y += Math.max(1, Math.floor(maxYear / 10))) {
    ctx.fillText(y, scaleX(y), pad.top + ch + 18);
  }
  ctx.textAlign = 'right';
  for (let v = 0; v <= maxVal; v += yStep) {
    ctx.fillText(fmt(v), pad.left - 8, scaleY(v) + 4);
  }

  // Axis titles
  ctx.fillStyle = var_accent;
  ctx.font = '600 12px DM Sans, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Ani', pad.left + cw / 2, H - 6);
  ctx.save();
  ctx.translate(14, pad.top + ch / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('EUR', 0, 0);
  ctx.restore();

  // Fill area: deposits
  ctx.fillStyle = 'rgba(9,105,218,0.15)';
  ctx.beginPath();
  ctx.moveTo(scaleX(0), scaleY(0));
  data.forEach(d => ctx.lineTo(scaleX(d.year), scaleY(d.deposits)));
  ctx.lineTo(scaleX(maxYear), scaleY(0));
  ctx.closePath();
  ctx.fill();

  // Fill area: interest (between deposits and total)
  ctx.fillStyle = 'rgba(26,127,55,0.15)';
  ctx.beginPath();
  data.forEach(d => ctx.lineTo(scaleX(d.year), scaleY(d.deposits)));
  for (let i = data.length - 1; i >= 0; i--) {
    ctx.lineTo(scaleX(data[i].year), scaleY(data[i].total));
  }
  ctx.closePath();
  ctx.fill();

  // Line: total
  ctx.strokeStyle = '#1a7f37';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  data.forEach((d, i) => {
    const x = scaleX(d.year), y = scaleY(d.total);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Line: deposits
  ctx.strokeStyle = '#0969da';
  ctx.lineWidth = 2;
  ctx.beginPath();
  data.forEach((d, i) => {
    const x = scaleX(d.year), y = scaleY(d.deposits);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Legend
  ctx.font = '12px DM Sans, sans-serif';
  const legendX = pad.left + 12;
  const legendY = pad.top + 16;
  ctx.fillStyle = '#0969da';
  ctx.fillRect(legendX, legendY - 8, 14, 3);
  ctx.fillStyle = '#57606a';
  ctx.textAlign = 'left';
  ctx.fillText('Contribuții', legendX + 20, legendY - 3);
  ctx.fillStyle = '#1a7f37';
  ctx.fillRect(legendX, legendY + 8, 14, 3);
  ctx.fillStyle = '#57606a';
  ctx.fillText('Total (cu dobândă)', legendX + 20, legendY + 13);

  // Store for tooltip
  canvas._data = data;
  canvas._scaleX = scaleX;
  canvas._scaleY = scaleY;
  canvas._maxYear = maxYear;
  canvas._maxVal = maxVal;
  canvas._pad = pad;
  canvas._cw = cw;
  canvas._ch = ch;
}

// Fix: use string for axis color
const var_accent = '#1a7f37';

// Tooltip
const chartCanvas = document.getElementById('chart');
const tooltipEl = document.getElementById('tooltip');

chartCanvas.addEventListener('mousemove', (e) => {
  if (!chartCanvas._data) { tooltipEl.style.display = 'none'; return; }
  const rect = chartCanvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const pad = chartCanvas._pad;
  const cw = chartCanvas._cw;

  if (mx < pad.left || mx > pad.left + cw) { tooltipEl.style.display = 'none'; return; }

  const yearHover = ((mx - pad.left) / cw) * chartCanvas._maxYear;
  const yearIdx = Math.round(yearHover);
  if (yearIdx < 0 || yearIdx >= chartCanvas._data.length) { tooltipEl.style.display = 'none'; return; }

  const d = chartCanvas._data[yearIdx];
  tooltipEl.innerHTML = `An ${d.year}<br>Total: ${fmt(d.total)} EUR<br>Contribuții: ${fmt(d.deposits)} EUR<br>Dobândă: ${fmt(d.interest)} EUR`;
  tooltipEl.style.display = 'block';
  let tx = mx + 15, ty = my - 10;
  if (tx + 250 > rect.width) tx = mx - 260;
  tooltipEl.style.left = tx + 'px';
  tooltipEl.style.top = ty + 'px';
});

chartCanvas.addEventListener('mouseleave', () => { tooltipEl.style.display = 'none'; });

// Event listeners
['inputPrincipal', 'inputMonthly', 'inputRate', 'inputYears', 'inputCompound'].forEach(id => {
  document.getElementById(id).addEventListener('input', calculate);
});

window.addEventListener('resize', calculate);

// Init
calculate();
</script>

</body>
</html>
