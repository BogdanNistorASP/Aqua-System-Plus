<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PENTAX - SELECTOR POMPE CENTRIFUGE CM / CMS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap');

:root {
  --bg: #ffffff;
  --surface: #f6f8fa;
  --surface2: #eef1f5;
  --border: #d0d7de;
  --text: #1f2328;
  --text-dim: #656d76;
  --accent: #0969da;
  --accent2: #1a7f37;
  --accent3: #cf5400;
  --accent4: #8250df;
  --danger: #cf222e;
  --cm-color: #0969da;
  --cms-color: #1a7f37;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.header {
  background: linear-gradient(135deg, #f0f4f8 0%, #e8edf3 50%, #f0f4f8 100%);
  border-bottom: 1px solid var(--border);
  padding: 20px 32px;
  display: flex;
  align-items: center;
  gap: 20px;
}

.logo {
  font-family: 'JetBrains Mono', monospace;
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent4));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -1px;
}

.header-sub {
  font-size: 17px;
  color: #000000;
  border-left: 1px solid var(--border);
  padding-left: 20px;
  font-weight: 500;
}

.main {
  display: grid;
  grid-template-columns: 340px 1fr;
  min-height: calc(100vh - 75px);
}

.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 24px;
  overflow-y: auto;
  max-height: calc(100vh - 75px);
}

.sidebar h3 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  margin-bottom: 14px;
  font-weight: 600;
}

.input-group { margin-bottom: 20px; }

.input-group label {
  display: block;
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 6px;
  font-weight: 500;
}

.input-row {
  display: flex;
  gap: 8px;
  align-items: center;
}

.input-row input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 15px;
  font-family: 'JetBrains Mono', monospace;
  outline: none;
  transition: border-color .2s;
}

.input-row input:focus { border-color: var(--accent); }

.input-row .unit {
  font-size: 12px;
  color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
  min-width: 40px;
}

.series-toggle {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
  background: var(--bg);
  border-radius: 10px;
  padding: 4px;
}

.series-btn {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  background: transparent;
  color: var(--text-dim);
  transition: all .2s;
  font-family: 'DM Sans', sans-serif;
}

.series-btn.active-cm {
  background: rgba(9,105,218,0.12);
  color: var(--cm-color);
}

.series-btn.active-cms {
  background: rgba(26,127,55,0.12);
  color: var(--cms-color);
}

.series-btn.active-all {
  background: rgba(130,80,223,0.12);
  color: var(--accent4);
}

.pump-list {
  max-height: calc(100vh - 420px);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.pump-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: background .15s;
  font-size: 13px;
  font-family: 'JetBrains Mono', monospace;
}

.pump-item:hover { background: var(--surface2); }

.pump-item.selected { background: rgba(9,105,218,0.08); }

.pump-item.active-in-chart { background: rgba(9,105,218,0.10); }

.pump-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.pump-dot.cm { background: var(--cm-color); }
.pump-dot.cms { background: var(--cms-color); }

.pump-name { flex: 1; }

.pump-h0 {
  font-size: 11px;
  color: var(--text-dim);
}

.match-badge {
  background: rgba(26,127,55,0.1);
  color: var(--accent2);
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 600;
}

.content {
  padding: 24px;
  overflow-y: auto;
  max-height: calc(100vh - 75px);
}

.canvas-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
  position: relative;
}

.canvas-wrap h3 {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
  color: var(--text);
}

canvas {
  width: 100%;
  height: 500px;
  display: block;
  border-radius: 8px;
}

.info-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 12px;
}

.info-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  position: relative;
}

.info-card .card-remove {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 24px;
  height: 24px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  color: var(--text-dim);
  font-size: 14px;
  line-height: 22px;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
  font-family: 'DM Sans', sans-serif;
}

.info-card .card-remove:hover {
  background: rgba(207,34,46,0.08);
  border-color: rgba(207,34,46,0.3);
  color: var(--danger);
}

.info-card .card-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.info-card .card-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px;
  font-weight: 700;
}

.info-card .card-sub {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 4px;
}

.info-card .card-params {
  margin-top: 6px;
  font-size: 12px;
  color: var(--text-dim);
  font-family: 'JetBrains Mono', monospace;
  display: grid;
  grid-template-columns: auto auto;
  gap: 2px 16px;
  width: fit-content;
}

.tooltip-box {
  position: absolute;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
  pointer-events: none;
  display: none;
  z-index: 10;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
}

.btn-clear {
  background: rgba(207,34,46,0.06);
  color: var(--danger);
  border: 1px solid rgba(207,34,46,0.2);
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  width: 100%;
  margin-top: 12px;
  font-family: 'DM Sans', sans-serif;
  transition: all .2s;
}

.btn-clear:hover { background: rgba(207,34,46,0.12); }

.search-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  margin-bottom: 12px;
  transition: border-color .2s;
}

.search-input:focus { border-color: var(--accent); }

.count-badge {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 8px;
  font-family: 'JetBrains Mono', monospace;
}

.op-point {
  display: inline-block;
  background: rgba(207,84,0,0.1);
  color: var(--accent3);
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 600;
  margin-left: 6px;
}

.header-author {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  opacity: 0.85;
  transition: opacity 0.3s ease;
}
.header-author:hover { opacity: 1; }
.header-author .author-sep {
  width: 1px;
  height: 24px;
  background: var(--border);
  margin: 0 4px;
}
.header-author .author-label {
  font-weight: 1000;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #000000;
}
.header-author .author-name {
  font-weight: 700;
  font-size: 9px;
  font-style: italic;
  color: #000000;
}
</style>
</head>

<div class="header">

  <div class="header-author">
    <div class="author-sep"></div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;">

      <span class="author-name">Bogdan Nistor</span>
    </div>
  </div>
</div>

<div class="main">

    <h3>Punct de funcționare</h3>

        <input type="number" id="inputQ" placeholder="ex: 30" step="0.1" min="0">
        <span class="unit">m³/h</span>
      </div>
    </div>
    <div class="input-group">
      <label>Înălțime dorita (H)</label>
      <div class="input-row">
        <input type="number" id="inputH" placeholder="ex: 25" step="0.1" min="0">
        <span class="unit">m</span>
      </div>
    </div>

    <h3 style="margin-top:24px">Serie</h3>
    <div class="series-toggle">
      <button class="series-btn active-all" id="btnAll" onclick="setSeries('all')">Toate</button>
      <button class="series-btn" id="btnCM" onclick="setSeries('cm')">CM</button>
      <button class="series-btn" id="btnCMS" onclick="setSeries('cms')">CMS</button>
    </div>

    <h3>Căutare pompă</h3>
    <input type="text" class="search-input" id="searchInput" placeholder="Filtru nume...">

    <div class="count-badge" id="countBadge">—</div>

    <div class="pump-list" id="pumpList"></div>

    <button class="btn-clear" onclick="clearSelection()">Resetare selecție</button>
  </div>

  <div class="content">
    <div class="canvas-wrap">
      <h3>Curbe caracteristice H = f(Q)

      </h3>
      <canvas id="chart"></canvas>
      <div class="tooltip-box" id="tooltip"></div>
    </div>

    <div class="info-cards" id="infoCards"></div>
  </div>
</div>

// Tag each pump
CM_PUMPS.forEach(p => p.series = 'cm');
CMS_PUMPS.forEach(p => p.series = 'cms');
const ALL_PUMPS = [...CM_PUMPS, ...CMS_PUMPS];

// ============ STATE ============
let activeSeries = 'all';
let selectedPumps = new Set();
let dismissedPumps = new Set();
let searchFilter = '';

// ============ POLY EVAL ============
function evalPoly(coeffs, Q) {
  // coeffs: [a6, a5, a4, a3, a2, a1, a0] => a6*Q^6 + a5*Q^5 + ...
  let val = 0;
  for (let i = 0; i < coeffs.length; i++) {
    val += coeffs[i] * Math.pow(Q, coeffs.length - 1 - i);
  }
  return val;
}

// Find Q range where H > 0 (fallback if qmax not set)
function findQmax(coeffs, maxSearch=600) {
  let qmax = 0;
  for (let q = 0; q <= maxSearch; q += 0.5) {
    if (evalPoly(coeffs, q) > 0) qmax = q;
    else if (q > 5 && evalPoly(coeffs, q) <= 0) break;
  }
  return qmax;
}

// Get the authoritative qmax for a pump (from docx data, fallback to calculated)
function getPumpQmax(pump) {
  return pump.qmax || findQmax(pump.coeffs);
}

// ============ COLORS ============
const CM_COLORS = [
  '#0969da','#0550ae','#2188ff','#0a69c7','#1a7fd4',
  '#0860c4','#1074cc','#0656b8','#1282e0','#0e6ecc'
];
const CMS_COLORS = [
  '#1a7f37','#116329','#2da44e','#1b8038','#248c3e',
  '#1a7830','#1f8b3d','#157030','#29a147','#1e8839'
];

function getPumpColor(pump, idx) {
  if (pump.series === 'cm') return CM_COLORS[idx % CM_COLORS.length];
  return CMS_COLORS[idx % CMS_COLORS.length];
}

// ============ FILTERING ============
function getVisiblePumps() {
  return ALL_PUMPS.filter(p => {
    if (activeSeries !== 'all' && p.series !== activeSeries) return false;
    if (searchFilter && !p.name.toLowerCase().includes(searchFilter.toLowerCase())) return false;
    return true;
  });
}

function setSeries(s) {
  activeSeries = s;
  document.getElementById('btnAll').className = 'series-btn' + (s==='all'?' active-all':'');
  document.getElementById('btnCM').className = 'series-btn' + (s==='cm'?' active-cm':'');
  document.getElementById('btnCMS').className = 'series-btn' + (s==='cms'?' active-cms':'');
  renderPumpList();
  drawChart();
}

function clearSelection() {
  selectedPumps.clear();
  dismissedPumps.clear();
  renderPumpList();
  drawChart();
  renderInfoCards();
}

// ============ PUMP LIST ============
function renderPumpList() {
  const list = document.getElementById('pumpList');
  const visible = getVisiblePumps();
  const targetQ = parseFloat(document.getElementById('inputQ').value);
  const targetH = parseFloat(document.getElementById('inputH').value);
  const hasTarget = !isNaN(targetQ) && !isNaN(targetH) && targetQ > 0 && targetH > 0;

  // Determine which pumps are currently shown in the chart/cards
  let activePumpNames = new Set();
  if (selectedPumps.size > 0) {
    activePumpNames = new Set(selectedPumps);
  } else if (hasTarget) {
    getVisiblePumps().forEach(p => {
      if (dismissedPumps.has(p.name)) return;
      const h = evalPoly(p.coeffs, targetQ);
      const qmax = getPumpQmax(p);
      if (h >= targetH * 0.85 && h <= targetH * 1.25 && targetQ <= qmax) {
        activePumpNames.add(p.name);
      }
    });
  }

  // Sort: selected first, then matches, then alphabetical
  const sorted = [...visible].map(p => {
    let match = false;
    if (hasTarget) {
      const h = evalPoly(p.coeffs, targetQ);
      const qmax = getPumpQmax(p);
      if (h >= targetH * 0.85 && h <= targetH * 1.25 && targetQ <= qmax) match = true;
    }
    const active = activePumpNames.has(p.name);
    return { pump: p, match, selected: selectedPumps.has(p.name), active };
  });

  sorted.sort((a, b) => {
    if (a.selected !== b.selected) return a.selected ? -1 : 1;
    if (a.match !== b.match) return a.match ? -1 : 1;
    return a.pump.name.localeCompare(b.pump.name, undefined, {numeric: true, sensitivity: 'base'});
  });

  document.getElementById('countBadge').textContent =
    `${visible.length} pompe` + (hasTarget ? ` · ${sorted.filter(s=>s.match).length} potriviri` : '');

  list.innerHTML = sorted.map(({ pump: p, match, selected, active }) => {
    const h0 = evalPoly(p.coeffs, 0).toFixed(1);
    const cls = selected ? 'selected' : (active ? 'active-in-chart' : '');
    return `<div class="pump-item ${cls}" onclick="togglePump('${p.name}')">
      <div class="pump-dot ${p.series}"></div>
      <div class="pump-name">${p.name}</div>
      ${match ? '<div class="match-badge">MATCH</div>' : ''}
      <div class="pump-h0">H₀=${h0}m</div>
    </div>`;
  }).join('');
}

function togglePump(name) {
  if (selectedPumps.has(name)) selectedPumps.delete(name);
  else selectedPumps.add(name);
  renderPumpList();
  drawChart();
  renderInfoCards();
}

// ============ CHART ============
function drawChart() {
  const canvas = document.getElementById('chart');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;

  const targetQ = parseFloat(document.getElementById('inputQ').value);
  const targetH = parseFloat(document.getElementById('inputH').value);
  const hasTarget = !isNaN(targetQ) && !isNaN(targetH) && targetQ > 0 && targetH > 0;

  // Determine which pumps to draw
  let pumpsToDraw = [];
  if (selectedPumps.size > 0) {
    pumpsToDraw = ALL_PUMPS.filter(p => selectedPumps.has(p.name));
  } else if (hasTarget) {
    // Show matching pumps
    pumpsToDraw = getVisiblePumps().filter(p => {
      if (dismissedPumps.has(p.name)) return false;
      const h = evalPoly(p.coeffs, targetQ);
      const qmax = getPumpQmax(p);
      return h >= targetH * 0.85 && h <= targetH * 1.25 && targetQ <= qmax;
    });
  }

  // Find axis ranges — X axis: 0 to max(qmax) + 10
  let maxQ = 50, maxH = 50;
  if (pumpsToDraw.length > 0) {
    pumpsToDraw.forEach(p => {
      const qm = getPumpQmax(p);
      if (qm + 5 > maxQ) maxQ = qm + 5;
      const h0 = evalPoly(p.coeffs, 0);
      if (h0 * 1.1 > maxH) maxH = h0 * 1.1;
    });
  }
  if (hasTarget) {
    if (targetQ * 1.2 > maxQ) maxQ = targetQ * 1.2;
    if (targetH * 1.2 > maxH) maxH = targetH * 1.2;
  }

  maxQ = Math.ceil(maxQ / 10) * 10;
  maxH = Math.ceil(maxH / 10) * 10;

  const pad = { top: 20, right: 30, bottom: 50, left: 60 };
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top - pad.bottom;

  const scaleX = q => pad.left + (q / maxQ) * cw;
  const scaleY = h => pad.top + ch - (h / maxH) * ch;

  // Background
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = '#e1e4e8';
  ctx.lineWidth = 0.5;
  for (let q = 0; q <= maxQ; q += maxQ > 200 ? 50 : (maxQ > 100 ? 20 : 10)) {
    ctx.beginPath();
    ctx.moveTo(scaleX(q), pad.top);
    ctx.lineTo(scaleX(q), pad.top + ch);
    ctx.stroke();
  }
  for (let h = 0; h <= maxH; h += maxH > 100 ? 20 : 10) {
    ctx.beginPath();
    ctx.moveTo(pad.left, scaleY(h));
    ctx.lineTo(pad.left + cw, scaleY(h));
    ctx.stroke();
  }

  // Axes
  ctx.strokeStyle = '#8b949e';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(pad.left, pad.top);
  ctx.lineTo(pad.left, pad.top + ch);
  ctx.lineTo(pad.left + cw, pad.top + ch);
  ctx.stroke();

  // Axis labels
  ctx.fillStyle = '#57606a';
  ctx.font = '11px JetBrains Mono, monospace';
  ctx.textAlign = 'center';
  for (let q = 0; q <= maxQ; q += maxQ > 200 ? 50 : (maxQ > 100 ? 20 : 10)) {
    ctx.fillText(q, scaleX(q), pad.top + ch + 18);
  }
  ctx.textAlign = 'right';
  for (let h = 0; h <= maxH; h += maxH > 100 ? 20 : 10) {
    ctx.fillText(h, pad.left - 8, scaleY(h) + 4);
  }

  // Axis titles
  ctx.fillStyle = '#0969da';
  ctx.font = '600 12px DM Sans, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Q [m³/h]', pad.left + cw / 2, H - 6);
  ctx.save();
  ctx.translate(14, pad.top + ch / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('H [m]', 0, 0);
  ctx.restore();

  // Target point
  if (hasTarget) {
    ctx.fillStyle = 'rgba(207,84,0,0.12)';
    ctx.beginPath();
    ctx.arc(scaleX(targetQ), scaleY(targetH), 20, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#cf5400';
    ctx.beginPath();
    ctx.arc(scaleX(targetQ), scaleY(targetH), 5, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = 'rgba(207,84,0,0.35)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(scaleX(targetQ), pad.top);
    ctx.lineTo(scaleX(targetQ), pad.top + ch);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(pad.left, scaleY(targetH));
    ctx.lineTo(pad.left + cw, scaleY(targetH));
    ctx.stroke();
    ctx.setLineDash([]);

    document.getElementById('opLabel').style.display = 'inline-block';
    document.getElementById('opLabel').textContent = `PF: Q=${targetQ} m³/h, H=${targetH} m`;
  } else {
    document.getElementById('opLabel').style.display = 'none';
  }

  // Draw curves
  let cmIdx = 0, cmsIdx = 0;
  pumpsToDraw.forEach((p) => {
    const color = p.series === 'cm' ? CM_COLORS[cmIdx++ % CM_COLORS.length] : CMS_COLORS[cmsIdx++ % CMS_COLORS.length];
    const qmax = getPumpQmax(p);
    const step = qmax / 200;

    ctx.strokeStyle = color;
    ctx.lineWidth = selectedPumps.has(p.name) ? 2.5 : 1.5;
    ctx.globalAlpha = selectedPumps.size > 0 && !selectedPumps.has(p.name) ? 0.3 : 1;
    ctx.beginPath();
    let started = false;
    for (let q = 0; q <= qmax; q += step) {
      const h = evalPoly(p.coeffs, q);
      if (h < 0) continue;
      const x = scaleX(q), y = scaleY(h);
      if (!started) { ctx.moveTo(x, y); started = true; }
      else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Label at Q=0
    const h0 = evalPoly(p.coeffs, 0);
    if (h0 > 0) {
      ctx.fillStyle = color;
      ctx.font = '10px JetBrains Mono, monospace';
      ctx.textAlign = 'left';
      ctx.globalAlpha = selectedPumps.size > 0 && !selectedPumps.has(p.name) ? 0.2 : 0.8;
      ctx.fillText(p.name.replace('CM ','').replace('CMS ',''), scaleX(0) + 4, scaleY(h0) - 4);
    }

    // If target, mark intersection
    if (hasTarget && p.series) {
      const hAtQ = evalPoly(p.coeffs, targetQ);
      if (hAtQ > 0 && targetQ <= qmax) {
        ctx.globalAlpha = 1;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(scaleX(targetQ), scaleY(hAtQ), 4, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  });

  // Empty state
  if (pumpsToDraw.length === 0) {
    ctx.fillStyle = '#656d76';
    ctx.font = '14px DM Sans, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Selectează pompe din lista din stânga sau introdu un punct de funcționare (Q, H)', W/2, H/2 - 10);
    ctx.font = '12px DM Sans, sans-serif';
    ctx.fillText('Pompele potrivite vor fi afișate automat', W/2, H/2 + 14);
  }

  // Store for tooltip
  canvas._pumps = pumpsToDraw;
  canvas._scaleX = scaleX;
  canvas._scaleY = scaleY;
  canvas._maxQ = maxQ;
  canvas._maxH = maxH;
  canvas._pad = pad;
  canvas._cw = cw;
  canvas._ch = ch;
}

// ============ TOOLTIP ============
const chartCanvas = document.getElementById('chart');
const tooltipEl = document.getElementById('tooltip');

chartCanvas.addEventListener('mousemove', (e) => {
  if (!chartCanvas._pumps || chartCanvas._pumps.length === 0) {
    tooltipEl.style.display = 'none';
    return;
  }
  const rect = chartCanvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const pad = chartCanvas._pad;
  const cw = chartCanvas._cw;
  const ch = chartCanvas._ch;

  if (mx < pad.left || mx > pad.left + cw || my < pad.top || my > pad.top + ch) {
    tooltipEl.style.display = 'none';
    return;
  }

  const qHover = ((mx - pad.left) / cw) * chartCanvas._maxQ;

  let lines = [`Q = ${qHover.toFixed(1)} m³/h`];
  chartCanvas._pumps.forEach(p => {
    const h = evalPoly(p.coeffs, qHover);
    const qmax = getPumpQmax(p);
    if (qHover <= qmax && h > 0) {
      lines.push(`${p.name}: H = ${h.toFixed(2)} m`);
    }
  });

  if (lines.length > 1) {
    tooltipEl.innerHTML = lines.join('<br>');
    tooltipEl.style.display = 'block';
    let tx = mx + 15, ty = my - 10;
    if (tx + 250 > rect.width) tx = mx - 260;
    tooltipEl.style.left = tx + 'px';
    tooltipEl.style.top = ty + 'px';
  } else {
    tooltipEl.style.display = 'none';
  }
});

chartCanvas.addEventListener('mouseleave', () => {
  tooltipEl.style.display = 'none';
});

// ============ INFO CARDS ============
function renderInfoCards() {
  const container = document.getElementById('infoCards');
  const targetQ = parseFloat(document.getElementById('inputQ').value);
  const targetH = parseFloat(document.getElementById('inputH').value);
  const hasTarget = !isNaN(targetQ) && !isNaN(targetH) && targetQ > 0 && targetH > 0;

  if (selectedPumps.size === 0 && !hasTarget) {
    container.innerHTML = '';
    return;
  }

  let pumps = selectedPumps.size > 0
    ? ALL_PUMPS.filter(p => selectedPumps.has(p.name))
    : getVisiblePumps().filter(p => {
        if (dismissedPumps.has(p.name)) return false;
        const h = evalPoly(p.coeffs, targetQ);
        const qmax = getPumpQmax(p);
        return h >= targetH * 0.85 && h <= targetH * 1.25 && targetQ <= qmax;
      });

  const isManualSelection = selectedPumps.size > 0;

  container.innerHTML = pumps.map(p => {
    const h0 = evalPoly(p.coeffs, 0).toFixed(1);
    const qmax = getPumpQmax(p);
    const hAtQmax = evalPoly(p.coeffs, qmax).toFixed(1);
    const hAtTarget = hasTarget ? evalPoly(p.coeffs, targetQ).toFixed(2) : '—';
    const seriesTag = p.series === 'cm'
      ? '<span style="color:var(--cm-color)">CM</span>'
      : '<span style="color:var(--cms-color)">CMS</span>';
    const removeFn = isManualSelection ? 'removePump' : 'dismissMatch';

    return `<div class="info-card">
      <button class="card-remove" onclick="${removeFn}('${p.name.replace(/'/g, "\\'")}')" title="Elimină ${p.name}">✕</button>
      <div class="card-title">${seriesTag} &bull; ${p.name}</div>
      ${hasTarget ? `<div class="card-value">${hAtTarget} m <span style="font-size:12px;font-weight:400;color:var(--text-dim)">la Q=${targetQ} m³/h</span></div>` : ''}
      <div class="card-params">
        <span>Q<sub>max</sub> = ${qmax.toFixed(1)} m³/h</span><span>H<sub>min</sub> = ${hAtQmax} m</span>
        <span>Q₀ = 0 m³/h</span><span>H<sub>max</sub> = ${h0} m</span>
      </div>
    </div>`;
  }).join('');
}

function removePump(name) {
  selectedPumps.delete(name);
  renderPumpList();
  drawChart();
  renderInfoCards();
}

function dismissMatch(name) {
  dismissedPumps.add(name);
  renderPumpList();
  drawChart();
  renderInfoCards();
}

// ============ EVENT LISTENERS ============
document.getElementById('inputQ').addEventListener('input', () => {
  dismissedPumps.clear();
  renderPumpList();
  drawChart();
  renderInfoCards();
});

document.getElementById('inputH').addEventListener('input', () => {
  dismissedPumps.clear();
  renderPumpList();
  drawChart();
  renderInfoCards();
});

document.getElementById('searchInput').addEventListener('input', (e) => {
  searchFilter = e.target.value;
  renderPumpList();
});

window.addEventListener('resize', drawChart);

// ============ INIT ============
renderPumpList();
drawChart();
</script>

</body>
</html>
